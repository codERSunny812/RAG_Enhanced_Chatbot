

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - ./backend/vectordb/faiss_index.bin:/app/vectordb/faiss_index.bin
      - ./backend/vectordb/metadata.json:/app/vectordb/metadata.json
    environment:
      - PYTHONUNBUFFERED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped